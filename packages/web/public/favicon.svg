<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bff"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b5cff"/>
      <stop offset="50%" stop-color="#3b9fff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#08080f"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>

  <!--
    5 bars w=2.5, gap=2 → total=20.5 → startX=(32-20.5)/2=5.75
    heights centered on cy=16
  -->
  <rect x="5.75"  y="14" width="2.5" height="4"  rx="1.25" fill="url(#barGrad)"/>
  <rect x="10.25" y="11" width="2.5" height="10" rx="1.25" fill="url(#barGrad)"/>
  <rect x="14.75" y="8"  width="2.5" height="16" rx="1.25" fill="url(#barGrad)"/>
  <rect x="19.25" y="11" width="2.5" height="10" rx="1.25" fill="url(#barGrad)"/>
  <rect x="23.75" y="14" width="2.5" height="4"  rx="1.25" fill="url(#barGrad)"/>
</svg>
